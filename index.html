<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Pulse | Connection Edition</title>
    <style>
        :root {
            --accent: #00ff88;
            --warning: #ff4757;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .game-shell {
            background: var(--card);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 95%;
            max-width: 800px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .mode-badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
        }
        #prompt-display {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 30px 0;
            min-height: 140px;
            line-height: 1.3;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .speaker-box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 2px solid var(--accent);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        #current-speaker { font-size: 1.8rem; color: var(--accent); font-weight: bold; }
        #timer { font-size: 2rem; color: var(--warning); font-family: monospace; font-weight: bold; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button {
            padding: 20px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-main { background: var(--accent); color: #000; }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
        .btn-sub { background: #475569; color: white; }
        #names-input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid #475569;
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-top: 30px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="game-shell">
    <div id="mode-label" class="mode-badge">Get Ready</div>
    
    <div class="speaker-box">
        <div>
            <div style="font-size: 0.8rem; opacity: 0.7; text-align: left;">ON THE MIC:</div>
            <div id="current-speaker">???</div>
        </div>
        <div>
            <div style="font-size: 0.8rem; opacity: 0.7;">CLOCK:</div>
            <div id="timer">30s</div>
        </div>
    </div>

    <div id="prompt-display">Enter names below to start!</div>

    <div class="btn-group">
        <button class="btn-main" onclick="playTurn()">NEXT TURN 🎲</button>
        <button class="btn-sub" onclick="toggleMode()">CHANGE GAME 🔄</button>
    </div>

    <input type="text" id="names-input" placeholder="Enter team names separated by commas...">
</div>

<script>
    const games = {
        "WORK & OFFICE": [
            "What's your 'Final Boss'—the work task you always procrastinate on?",
            "If you were the CEO for one day, what's the first 'fun' rule you'd make?",
            "What's your secret to surviving a 2-hour meeting?",
            "What is your 'guilty pleasure' background music/noise while working?",
            "What was your very first job and what did it teach you?",
            "Tell us about a time you accidentally sent a message to the wrong person.",
            "If you could delete one corporate buzzword forever, which one is it?",
            "What’s the most unusual thing you’ve ever had on your desk?",
            "If the office was a movie, what genre would it be and who are you?",
            "What's your go-to 'I need to focus' snack?",
            "What’s the best workspace you’ve ever had (home or office)?",
            "If you could automate one part of your life, what would it be?",
            "What is the most helpful productivity tip you've ever actually used?",
            "Describe your dream office setup in 30 seconds.",
            "What’s your favorite 'small win' at work?",
            "If you could have a snack machine next to your desk, what's in it?",
            "What is your favorite Slack/Teams emoji to use?",
            "How do you prefer to start your workday morning?",
            "What is the most interesting project you've ever worked on?",
            "If you had to teach the team a 5-minute lesson on anything, what would it be?",
            "What's your favorite way to 'recharge' during a busy day?",
            "If you could work from any location in the world for a week, where?"
        ],
        "LIFE & VIBES": [
            "What’s a hobby you have that has absolutely nothing to do with your job?",
            "If you could be an expert in any skill instantly, what would it be?",
            "What is the best travel destination you've ever been to?",
            "What’s the weirdest food you’ve ever tried (and did you like it)?",
            "What is your 'comfort' movie or TV show you've seen 100 times?",
            "If you could live in any fictional world (books/movies), which one?",
            "What was the last thing you learned that blew your mind?",
            "What’s a hidden talent you have that nobody here knows about?",
            "What is your most used emoji in the last 24 hours?",
            "If you could have dinner with any historical figure, who would it be?",
            "What’s the best concert you’ve ever been to?",
            "What is one thing you are surprisingly competitive about?",
            "What is your favorite way to spend a rainy Sunday?",
            "If you could witness any event in history, what would it be?",
            "What’s the first thing you usually do when you get home?",
            "Do you have a 'weird' collection of anything?",
            "What’s a book that changed the way you think?",
            "What is the best gift you have ever received?",
            "Are you a morning person or a night owl? Explain your peak hours.",
            "What is your favorite childhood memory involving a pet or animal?",
            "If you had to pick a theme song for your life, what would it be?",
            "What’s the most adventurous thing you’ve ever done?"
        ],
        "HYPOTHETICALS": [
            "If we were all stuck on a deserted island, what would your 'role' be?",
            "You have to win a reality TV show to save the world. Which show are you picking?",
            "If you could have any animal as a perfectly trained pet, what is it?",
            "You find a time machine. Do you go 100 years back or 100 years forward?",
            "If you were a superhero, what would your minor, semi-useless power be?",
            "You can only eat one meal for the rest of your life. What is it?",
            "If you were a ghost, who or what would you haunt just for fun?",
            "If you could swap lives with any celebrity for a week, who is it?",
            "If you could rename the planet Earth, what would you call it?",
            "You are given a boat. What do you name it and where are you sailing?",
            "If you could talk to one species of animal, which would you choose?",
            "What’s the first thing you’d buy if you won the lottery today?",
            "If you could design a new holiday, what would it celebrate?",
            "What would the title of your autobiography be?",
            "If you could live under the ocean or in outer space, which would you choose?",
            "If you found a lamp with a genie, what's your first wish (no extra wishes!)?",
            "If you were a color, which one would you be and why?",
            "If you could freeze time for everyone but yourself for one hour, what would you do?",
            "If you had to live without your phone or your car for a month, which goes?",
            "You can have any famous person (alive or dead) as your personal driver. Who?",
            "If you were an Olympic athlete, what sport would you want to be a pro in?",
            "You're an alien visiting Earth for the first time. What's the hardest thing to explain?"
        ]
    };

    let gameKeys = Object.keys(games);
    let currentModeIndex = 0;
    let timerInterval;

    function toggleMode() {
        currentModeIndex = (currentModeIndex + 1) % gameKeys.length;
        document.getElementById('mode-label').innerText = gameKeys[currentModeIndex];
        document.getElementById('prompt-display').innerText = "Mode Switched! Ready for the next speaker.";
        clearInterval(timerInterval);
        document.getElementById('timer').innerText = "30s";
        document.getElementById('timer').style.color = 'var(--text)';
    }

    function startTimer() {
        clearInterval(timerInterval);
        let seconds = 30;
        const timerElement = document.getElementById('timer');
        timerElement.style.color = 'var(--accent)';
        timerElement.innerText = seconds + "s";

        timerInterval = setInterval(() => {
            seconds--;
            timerElement.innerText = seconds + "s";
            if (seconds <= 10) timerElement.style.color = 'var(--warning)';
            if (seconds <= 0) {
                clearInterval(timerInterval);
                timerElement.innerText = "TIME!";
            }
        }, 1000);
    }

    function playTurn() {
        const namesInput = document.getElementById('names-input').value;
        const nameDisplay = document.getElementById('current-speaker');
        const promptDisplay = document.getElementById('prompt-display');
        const modeLabel = document.getElementById('mode-label');

        if (namesInput.trim() !== "") {
            const names = namesInput.split(',').map(n => n.trim()).filter(n => n !== "");
            nameDisplay.innerText = names[Math.floor(Math.random() * names.length)];
        } else {
            nameDisplay.innerText = "Volunteer!";
        }

        const currentMode = gameKeys[currentModeIndex];
        modeLabel.innerText = currentMode;
        const currentPrompts = games[currentMode];
        promptDisplay.innerText = currentPrompts[Math.floor(Math.random() * currentPrompts.length)];

        startTimer();
    }
</script>

</body>
</html>
